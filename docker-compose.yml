services:

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shopfront
      POSTGRES_USER: shopfront
      POSTGRES_PASSWORD: shopfront
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopfront -d shopfront"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: market-app/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://db:5432/shopfront
      SPRING_R2DBC_USERNAME: shopfront
      SPRING_R2DBC_PASSWORD: shopfront
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
