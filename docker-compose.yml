services:

  redis:
    image: redis:7-alpine
    container_name: market-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    image: market/payment-service:latest
    container_name: market-payment
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      # Initial balance in kopecks (1 000 000 коп. = 10 000 руб.)
      PAYMENT_INITIAL_BALANCE: ${PAYMENT_INITIAL_BALANCE:-1000000}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  market-app:
    build:
      context: ./market-app
      dockerfile: Dockerfile
    image: market/market-app:latest
    container_name: market-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATA_REDIS_URL: redis://market-redis:6379
      # Points at the payment-service container by Docker service name
      PAYMENT_SERVICE_URL: http://market-payment:8081
    depends_on:
      redis:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
