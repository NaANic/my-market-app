services:
  db:
    image: postgres:16-alpine
    container_name: market-db
    environment:
      POSTGRES_DB: shopfront
      POSTGRES_USER: shopfront
      POSTGRES_PASSWORD: shopfront
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopfront -d shopfront"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: market-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: market-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q UP <&3"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: market-payment
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      PAYMENT_INITIAL_BALANCE: ${PAYMENT_INITIAL_BALANCE:-1000000}
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/market
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  market-app:
    build:
      context: .
      dockerfile: market-app/Dockerfile
    container_name: market-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://db:5432/shopfront
      SPRING_R2DBC_USERNAME: shopfront
      SPRING_R2DBC_PASSWORD: shopfront
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      PAYMENT_SERVICE_URL: http://payment-service:8081
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/market
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-market-app}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-please-override}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy

volumes:
  postgres_data:
