# Database (H2 in PostgreSQL-compatibility mode for ILIKE support)
spring.r2dbc.url=r2dbc:h2:mem:///testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.r2dbc.username=sa
spring.r2dbc.password=
spring.sql.init.mode=always

# Redis (replaced by mocks in @SpringBootTest TestConfig)
spring.data.redis.host=localhost
spring.data.redis.port=16379
spring.data.redis.repositories.enabled=false

# Payment service URL (PaymentClientService is mocked in tests)
payment.service.url=http://localhost:19999

# Disable default Spring Security user (we provide our own UserDetailsService)
spring.security.user.name=disabled
spring.security.user.password=disabled

# Exclude Redis & OAuth2 auto-configurations
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.oauth2.client.reactive.ReactiveOAuth2ClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.oauth2.resource.reactive.ReactiveOAuth2ResourceServerAutoConfiguration