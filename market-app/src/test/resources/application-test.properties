# ?? Database ????????????????????????????????????????????????????????????????
# Use H2 in PostgreSQL-compatibility mode so that SQL constructs like
# ILIKE (used in ItemRepository queries) are accepted.
# DB_CLOSE_DELAY=-1 keeps the in-memory DB alive for the lifetime of the JVM.
spring.r2dbc.url=r2dbc:h2:mem:///testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.r2dbc.username=sa
spring.r2dbc.password=
spring.sql.init.mode=always

# ?? Redis ????????????????????????????????????????????????????????????????????
# Dummy coordinates ? the actual connection factory is replaced by a @MockBean
# in FullFlowIntegrationTest.TestConfig, so Lettuce never connects here.
# repositories.enabled=false prevents Spring Data from scanning for Redis repos.
spring.data.redis.host=localhost
spring.data.redis.port=16379
spring.data.redis.repositories.enabled=false

# ?? Payment service ??????????????????????????????????????????????????????????
# Dummy URL ? PaymentClientService is replaced by a @MockBean in tests that
# need it (FullFlowIntegrationTest), so no connection is ever attempted.
payment.service.url=http://localhost:19999

spring.security.user.name=disabled
spring.security.user.password=disabled

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# Override production OAuth2 client config ? set issuer-uri to empty so Boot
# skips OIDC discovery, then provide individual URIs that point to a port
# that's never used. PaymentClientConfig is excluded via @Profile("!test"),
# so these registrations are never used by application code; they only need
# to satisfy bean wiring.
spring.security.oauth2.client.provider.keycloak.issuer-uri=
spring.security.oauth2.client.provider.keycloak.token-uri=http://localhost:9999/token
spring.security.oauth2.client.provider.keycloak.authorization-uri=http://localhost:9999/authorize
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=http://localhost:9999/jwks
spring.security.oauth2.client.registration.keycloak.client-id=test-client
spring.security.oauth2.client.registration.keycloak.client-secret=test-secret
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=client_credentials
